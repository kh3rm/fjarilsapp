<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Butterfly app icon">

  <defs>
    <linearGradient id="wingCoral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F47B68"/>
      <stop offset="100%" stop-color="#EA6F5C"/>
    </linearGradient>
    <linearGradient id="wingOrange" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDB86A"/>
      <stop offset="100%" stop-color="#F79A4D"/>
    </linearGradient>
    <linearGradient id="wingPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB2A8"/>
      <stop offset="100%" stop-color="#F4958E"/>
    </linearGradient>
    <linearGradient id="wingYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE6A6"/>
      <stop offset="100%" stop-color="#F9C667"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#30302B"/>
      <stop offset="100%" stop-color="#1E1F1C"/>
    </linearGradient>
    <linearGradient id="bgWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF5E4"/>
    </linearGradient>
    <linearGradient id="bgMask" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#FFF2DC"/>
    </linearGradient>
    <g id="butterflyMark">
      <!-- Upper wings -->
      <ellipse cx="348" cy="374" rx="182" ry="125" transform="rotate(24 348 374)" fill="url(#wingCoral)"/>
      <ellipse cx="676" cy="374" rx="182" ry="125" transform="rotate(-24 676 374)" fill="url(#wingOrange)"/>
      <!-- Lower wings -->
      <ellipse cx="405" cy="642" rx="91" ry="145" transform="rotate(28 405 642)" fill="url(#wingPink)"/>
      <ellipse cx="619" cy="642" rx="91" ry="145" transform="rotate(-28 619 642)" fill="url(#wingYellow)"/>
      <!-- Inner wing accents -->
      <ellipse cx="377" cy="393" rx="122" ry="52" transform="rotate(24 377 393)" fill="#C45F51" opacity="0.28"/>
      <ellipse cx="647" cy="393" rx="122" ry="52" transform="rotate(-24 647 393)" fill="#D2763B" opacity="0.26"/>
      <ellipse cx="421" cy="669" rx="42" ry="89" transform="rotate(28 421 669)" fill="#D96D68" opacity="0.30"/>
      <ellipse cx="603" cy="669" rx="42" ry="89" transform="rotate(-28 603 669)" fill="#D9953D" opacity="0.25"/>
      <!-- Antennae -->
      <path d="M499 300 C459 220 405 176 361 184" fill="none" stroke="#262724" stroke-width="18" stroke-linecap="round"/>
      <path d="M525 300 C565 220 619 176 663 184" fill="none" stroke="#262724" stroke-width="18" stroke-linecap="round"/>
      <!-- Body -->
      <ellipse cx="512" cy="532" rx="55" ry="229" fill="url(#bodyGrad)"/>
    </g>
  </defs>

<use href="#butterflyMark"/>
</svg>